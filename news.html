<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Edge 专用贪吃蛇</title>
    <style>
        body { background: #222; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; color: white; flex-direction: column; }
        canvas { border: 2px solid #fff; background: #000; box-shadow: 0 0 20px #000; }
        .stats { margin-top: 10px; font-family: 'Courier New', Courier, monospace; font-size: 20px; }
    </style>
</head>
<body>
    <div style="margin-bottom:10px;">使用方向键控制 (↑ ↓ ← →)</div>
    <canvas id="gc" width="400" height="400"></canvas>
    <div class="stats">SCORE: <span id="score">0</span></div>

<script>
window.onload = function() {
    const canvas = document.getElementById("gc");
    const ctx = canvas.getContext("2d");
    const scoreEl = document.getElementById("score");

    let px = 10, py = 10; // 蛇头位置
    let gs = 20, tc = 20; // 网格大小和数量
    let ax = 15, ay = 15; // 苹果位置
    let xv = 0, yv = 0;   // 速度
    let trail = [];
    let tail = 5;
    let score = 0;

    // 监听键盘
    document.addEventListener("keydown", function(e) {
        switch(e.keyCode) {
            case 37: if(xv!==1) {xv=-1; yv=0;} break; // 左
            case 38: if(yv!==1) {xv=0; yv=-1;} break; // 上
            case 39: if(xv!==-1) {xv=1; yv=0;} break; // 右
            case 40: if(yv!==-1) {xv=0; yv=1;} break; // 下
        }
    });

    // 游戏主循环
    setInterval(function() {
        px += xv;
        py += yv;

        // 穿墙逻辑
        if(px < 0) px = tc-1;
        if(px > tc-1) px = 0;
        if(py < 0) py = tc-1;
        if(py > tc-1) py = 0;

        // 背景
        ctx.fillStyle = "black";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // 画蛇
        ctx.fillStyle = "lime";
        for(let i=0; i<trail.length; i++) {
            ctx.fillRect(trail[i].x*gs, trail[i].y*gs, gs-2, gs-2);
            // 撞到自己
            if(trail[i].x === px && trail[i].y === py && (xv!==0 || yv!==0)) {
                tail = 5;
                score = 0;
                scoreEl.innerHTML = score;
            }
        }
        trail.push({x:px, y:py});
        while(trail.length > tail) {
            trail.shift();
        }

        // 吃苹果
        if(ax === px && ay === py) {
            tail++;
            score += 10;
            scoreEl.innerHTML = score;
            ax = Math.floor(Math.random()*tc);
            ay = Math.floor(Math.random()*tc);
        }

        // 画苹果
        ctx.fillStyle = "red";
        ctx.fillRect(ax*gs, ay*gs, gs-2, gs-2);

    }, 1000/15); // 15 FPS
}
</script>
</body>
</html>
